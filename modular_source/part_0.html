<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenAI Codex — The Definitive Guide</title>
  <style>
    :root{
      --primary:#10A37F;
      --dark:#1A1A2E;
      --accent:#0D7377;
      --light:#F0FAF7;
      --header-bg:#10A37F;
      --code-bg:#1E1E2E;
      --code-text:#A8FF78;
      --white:#FFFFFF;
      --gray:#6B7280;
      --light-gray:#F3F4F6;
      --border:#D1FAE5;
      --info:#E8F8F5;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      background:#eef2f7;
      color:var(--dark);
      font-family:Arial, Helvetica, sans-serif;
      font-size:16px;
      line-height:1.55;
    }

    .page{
      width:min(980px, calc(100% - 32px));
      margin:32px auto;
      background:var(--white);
      padding:64px;
      box-shadow:0 20px 60px rgba(0,0,0,.08);
      border-radius:18px;
    }

    .cover{
      min-height:900px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      text-align:center;
    }

    .logo{
      font-size:96px;
      line-height:1;
      color:var(--primary);
      margin-bottom:24px;
    }

    h1{
      margin:48px 0 24px;
      padding:18px 22px;
      background:var(--primary);
      color:var(--white);
      font-size:30px;
      line-height:1.2;
      border-radius:12px;
    }

    h2{
      margin:40px 0 18px;
      padding-bottom:10px;
      border-bottom:4px solid var(--primary);
      font-size:24px;
      line-height:1.25;
      color:var(--dark);
    }

    h3{
      margin:28px 0 12px;
      font-size:20px;
      color:var(--accent);
    }

    p{margin:12px 0}
    em{color:var(--gray)}
    .subtitle{
      color:var(--gray);
      font-size:22px;
      font-style:italic;
    }

    .title{
      font-size:58px;
      line-height:1.03;
      margin:0;
      font-weight:800;
      letter-spacing:-1.5px;
    }
    .title .green{color:var(--primary)}

    .tagline{
      color:var(--accent);
      font-size:17px;
      margin-top:28px;
    }

    .divider{
      height:1px;
      background:var(--border);
      margin:32px 0;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:12px;
      margin-top:36px;
    }

    .stat{
      background:var(--light);
      border:1px solid var(--border);
      border-radius:12px;
      padding:22px;
      text-align:center;
    }

    .stat strong{
      display:block;
      color:var(--primary);
      font-size:24px;
    }

    .stat span{
      color:var(--gray);
      font-size:15px;
    }

    .module-header{
      display:grid;
      grid-template-columns:170px 1fr;
      overflow:hidden;
      border:1px solid var(--border);
      border-radius:16px;
      margin:56px 0 28px;
    }

    .module-number{
      background:var(--dark);
      color:var(--light);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:28px 16px;
      text-align:center;
      text-transform:uppercase;
      letter-spacing:1px;
      font-size:14px;
    }

    .module-number strong{
      color:var(--primary);
      font-size:56px;
      line-height:1;
      letter-spacing:0;
    }

    .module-copy{
      background:var(--light);
      padding:28px 32px;
    }

    .module-copy h2{
      margin:0 0 8px;
      border:0;
      padding:0;
      font-size:28px;
    }

    .module-copy p{
      margin:0;
      color:var(--gray);
      font-style:italic;
    }

    table{
      border-collapse:collapse;
      width:100%;
      margin:20px 0 28px;
      overflow:hidden;
      border-radius:12px;
      border:1px solid var(--border);
    }

    th,td{
      border:1px solid var(--border);
      padding:12px 14px;
      vertical-align:top;
    }

    th{
      background:var(--primary);
      color:var(--white);
      text-align:left;
      font-weight:700;
    }

    td:first-child{
      background:var(--light);
      font-weight:700;
    }

    code, pre{
      font-family:"Courier New", Courier, monospace;
    }

    pre{
      background:var(--code-bg);
      color:var(--code-text);
      padding:18px 20px;
      border-radius:12px;
      overflow:auto;
      border:1px solid rgba(255,255,255,.08);
      font-size:14px;
      line-height:1.55;
      margin:16px 0 24px;
    }

    .prompt-box{
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
      margin:22px 0 30px;
    }

    .prompt-title{
      background:var(--primary);
      color:var(--white);
      padding:12px 18px;
      font-weight:700;
    }

    .prompt-body{
      background:var(--light);
      padding:18px 22px;
      white-space:pre-wrap;
      font-family:"Courier New", Courier, monospace;
      font-size:15px;
    }

    .info-box{
      display:grid;
      grid-template-columns:56px 1fr;
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
      margin:22px 0;
    }

    .info-icon{
      background:var(--accent);
      color:var(--white);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      font-size:24px;
    }

    .info-body{
      background:var(--info);
      padding:16px 18px;
    }

    ul{
      padding-left:0;
      list-style:none;
    }

    li{
      margin:10px 0;
      padding-left:28px;
      position:relative;
    }

    li::before{
      content:"▸";
      position:absolute;
      left:0;
      color:var(--primary);
      font-weight:800;
    }

    .footer{
      margin-top:56px;
      padding-top:24px;
      border-top:1px solid var(--border);
      text-align:center;
      color:var(--gray);
      font-size:14px;
      font-style:italic;
    }

    .page-break{break-before:page}

    @media print{
      body{background:#fff}
      .page{
        width:auto;
        margin:0;
        box-shadow:none;
        border-radius:0;
        padding:36pt;
      }
      .page-break{break-before:page}
      pre, table, .prompt-box, .info-box, .module-header{break-inside:avoid}
    }

    @media (max-width:760px){
      .page{padding:28px}
      .title{font-size:40px}
      .stats{grid-template-columns:1fr}
      .module-header{grid-template-columns:1fr}
      .module-number{padding:18px}
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="cover">
      <img class="hero-logo" src="logo.png">
      <h1 class="title">OPENAI CODEX<br><span class="green">DEFINITIVE COURSE</span></h1>
      <p class="subtitle">From Zero to Master — April 2026</p>
      <div class="divider"></div>
      <p class="tagline">CLI · codex-action · Desktop App · GitHub Copilot · Skills · MCP · Subagents · Worktrees · Computer Use · Enterprise</p>
      <div class="stats">
        <div class="stat"><strong>14 Modules</strong><span>Theory + Practice</span></div>
        <div class="stat"><strong>25+ Prompts</strong><span>Ready to use</span></div>
        <div class="stat"><strong>3 CI/CD YAMLs</strong><span>Updated Apr 2026</span></div>
      </div>
    </section>
